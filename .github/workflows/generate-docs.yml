name: Generate Documentation

# Triggers: on push to main when source files change, or manually via workflow_dispatch
on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '*.css'
      - '*.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate documentation
        run: node .github/scripts/generate-docs.js

      - name: Check for documentation changes
        id: check-changes
        run: |
          git diff --quiet docs/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push documentation
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: auto-generate documentation for Putting Tracker

          Updated documentation for HTML, CSS, and JS source files.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
